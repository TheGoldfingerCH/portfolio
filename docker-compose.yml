services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SITE_URL: ${SITE_URL:-http://localhost:4321}
    image: portfolio-nicolas-geng:latest
    container_name: portfolio
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 4321
    ports:
      - "4321:4321"

services:
  portfolio-dev:
    image: node:22-alpine
    container_name: portfolio-dev
    working_dir: /app
    command: sh -c "npm install --no-audit --no-fund && npm run dev"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 4321
    ports:
      - "4321:4321"
    volumes:
      - .:/app
      - node_modules:/app/node_modules

volumes:
  node_modules:

name: Build static site and push to deploy branch (for Plesk)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build (static)
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://allrun.ch' }}
          PUBLIC_CHAT_API_URL: ${{ vars.PUBLIC_CHAT_API_URL }}
        run: npm run build

      - name: Publish dist/ to "deploy" branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # The Astro static build emits everything under dist/.
          if [ ! -d dist ]; then
            echo "::error::No dist/ folder produced by the build."
            exit 1
          fi

          # Configure git committer for the deploy branch.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Create a fresh worktree dedicated to the deploy branch.
          DEPLOY_DIR="$(mktemp -d)"
          git worktree add --detach "$DEPLOY_DIR"
          (cd "$DEPLOY_DIR" && rm -rf ./*) || true

          # Copy the built site into it (flatten dist/ to the root).
          cp -R dist/. "$DEPLOY_DIR"/

          # Tell GitHub Pages / Plesk to skip Jekyll-style processing of the _astro folder.
          touch "$DEPLOY_DIR/.nojekyll"

          cd "$DEPLOY_DIR"
          git checkout -B deploy
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi
          git commit -m "Build: ${GITHUB_SHA::8}"
          git push -f origin deploy
